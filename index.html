<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>github_talk transcript</title>
  <style>
    body {
      margin: 0;
      background: #f7f5ef;
      color: #111827;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.65;
      font-size: 15px;
    }

    .fallback {
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main>
    <pre id="transcript">Loading transcript...</pre>
    <noscript>
      <p class="fallback"><a href="transcript.txt">Open transcript.txt</a></p>
    </noscript>
  </main>
  <script>
    fetch("transcript.txt", { cache: "no-store" })
      .then(function (response) {
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.text();
      })
      .then(function (text) {
        document.getElementById("transcript").textContent = text;
      })
      .catch(function (error) {
        document.getElementById("transcript").textContent =
          "Failed to load transcript.txt: " + error.message;
      });
  </script>
</body>
</html>
